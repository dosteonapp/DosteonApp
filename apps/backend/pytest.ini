[pytest]
# Treat backend/ as the project root so `import app` works in tests
pythonpath = .

# By default, only run tests under the dedicated tests/ tree
# (top-level scripts like test_conn.py are treated as manual tools)
testpaths = tests

# Configure asyncio plugin so async tests run cleanly
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function

# You can override from CLI when you explicitly want to run scripts or root tests, e.g.:
#   pytest test_conn.py scripts/test_db.py
