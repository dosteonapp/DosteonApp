<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Dosteon</title>
  <style>
    :root {
      --primary: #3851DD;
      --background: #f8fafc;
      --text: #0f172a;
      --text-muted: #64748b;
      --card-bg: #ffffff;
      --border: #e2e8f0;
    }

    /* Support high contrast / dark mode natively if preferred */
    @media (prefers-color-scheme: dark) {
      :root {
        --background: #0f172a;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --card-bg: #1e293b;
        --border: #334155;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .container {
      background: var(--card-bg);
      padding: 48px 32px;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      max-width: 420px;
      width: 100%;
      transition: transform 0.3s ease;
    }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.05em;
    }

    .icon-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 24px auto;
      background: rgba(56, 81, 221, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2.5s infinite;
    }

    .icon {
      font-size: 36px;
      animation: bounce 3s ease-in-out infinite;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 12px 0;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin: 0 0 28px 0;
    }

    .btn {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 4px 12px rgba(56, 81, 221, 0.25);
      transition: background-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      background-color: #273bb6;
      box-shadow: 0 6px 16px rgba(56, 81, 221, 0.35);
    }

    .btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 6px rgba(56, 81, 221, 0.2);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(56, 81, 221, 0.4);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(56, 81, 221, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(56, 81, 221, 0);
      }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-area">
      <div class="logo">Dosteon</div>
    </div>
    
    <div class="icon-wrapper">
      <div class="icon">🔌</div>
    </div>
    
    <h1>No Connection Found</h1>
    <p>Dosteon is unable to connect to the network. Please check your internet connection or Wi-Fi settings and try again.</p>
    
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
