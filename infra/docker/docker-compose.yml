version: '3.8'

services:
  # PostgreSQL Database (for local development without Supabase)
  postgres:
    image: postgres:15-alpine
    container_name: dosteon-postgres
    environment:
      POSTGRES_DB: dosteon_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dosteon-network

  # Redis (for caching and rate limiting)
  redis:
    image: redis:7-alpine
    container_name: dosteon-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - dosteon-network

  # Backend API (optional - can run locally instead)
  # backend:
  #   build:
  #     context: ../../apps/backend
  #     dockerfile: ../../infra/docker/backend.Dockerfile
  #   container_name: dosteon-backend
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/dosteon_dev
  #     - DIRECT_URL=postgresql://postgres:postgres@postgres:5432/dosteon_dev
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   volumes:
  #     - ../../apps/backend:/app
  #   networks:
  #     - dosteon-network

  # Frontend (optional - can run locally instead)
  # frontend:
  #   build:
  #     context: ../../apps/frontend
  #     dockerfile: ../../infra/docker/frontend.Dockerfile
  #   container_name: dosteon-frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:8000
  #   depends_on:
  #     - backend
  #   volumes:
  #     - ../../apps/frontend:/app
  #     - /app/node_modules
  #   networks:
  #     - dosteon-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dosteon-network:
    driver: bridge
