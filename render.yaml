# Render blueprint configuration for Dosteon
# This file automates the deployment of both Frontend and Backend.

services:
  # TODO: upgrade to plan: starter before scaling beyond MVP traffic
  # Free tier has cold starts and resource limits — see docs/DEPLOYMENT.md
  - type: web
    name: dosteon-backend
    env: python
    region: ohio # Or your preferred region
    plan: free
    healthCheckPath: /health/ready
    numInstances: 1
    # Root directory for this service
    rootDir: backend
    # Build command: install dependencies and generate Prisma client
    # NOTE: migrations are run manually before each production deploy — not here.
    # Run: DIRECT_URL="$PROD_DIRECT_URL" python backend/scripts/migrate_xxx.py
    buildCommand: |
      pip install -r requirements.txt
      python -m prisma generate
      python -m prisma fetch
    # Start command: use gunicorn for production as recommended in DEPLOYMENT.md
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9 # Fixes pydantic-core Rust compilation issues
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Set in Render Dashboard (Connection Pooling URL)
      - key: DIRECT_URL
        sync: false # Set in Render Dashboard (Direct DB URL for migrations)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AUTH_REDIRECT_URL
        sync: false

  - type: web
    name: dosteon-staging-api
    env: python
    region: ohio
    plan: free
    healthCheckPath: /health/ready
    numInstances: 1
    rootDir: backend
    branch: develop
    buildCommand: |
      pip install -r requirements.txt
      python -m prisma generate
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: staging
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AUTH_REDIRECT_URL
        sync: false
      - key: BACKEND_CORS_ORIGINS
        value: '["https://staging.dosteon.com"]'

  - type: web
    name: dosteon-frontend
    env: node
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: BACKEND_URL
        sync: false # e.g., https://dosteon-backend.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
